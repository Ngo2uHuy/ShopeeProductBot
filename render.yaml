services:
  - type: web
    name: shopee-telegram-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false # Giá trị của Token sẽ được bạn tự định nghĩa thủ công trong cài đặt Dashboard của Render
